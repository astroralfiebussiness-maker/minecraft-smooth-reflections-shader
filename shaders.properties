# Smooth Reflections Shader Pack
# Main configuration file

# Reflection quality (1-4, higher = better but slower)
reflection_quality=3

# Water reflection settings
water_reflection=true
water_reflection_distance=128

# Temporal anti-aliasing
enable_taa=true

# Screen-space reflections
enable_ssr=true
ssr_distance=64
ssr_step_size=2

# Normal mapping
enable_normal_maps=true

# Parallax occlusion mapping
enable_pom=false

# Shadow distance
shadow_distance=256

# Max render distance influence
max_render_distance=512
